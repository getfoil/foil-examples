<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechMart Customer Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    header span {
      font-size: 12px;
      opacity: 0.7;
    }

    #new-session-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    #new-session-btn:hover { background: rgba(255,255,255,0.25); }

    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      margin-bottom: 14px;
      display: flex;
    }

    .message.user { justify-content: flex-end; }
    .message.agent { justify-content: flex-start; }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: #0066ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .agent .bubble {
      background: #e8e8e8;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .bubble img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      display: block;
      margin-top: 6px;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    #test-customers {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 8px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    #test-customers label {
      font-size: 12px;
      color: #888;
    }

    .chip {
      background: #e8e8e8;
      border: none;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      color: #444;
    }

    .chip:hover { background: #d0d0d0; }

    #input-area {
      border-top: 1px solid #ddd;
      background: #fff;
      padding: 12px 20px;
    }

    #input-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #image-preview {
      display: none;
      position: relative;
      margin-bottom: 4px;
    }

    #image-preview img {
      height: 48px;
      border-radius: 6px;
    }

    #image-preview button {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: #666;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #message-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 120px;
      font-family: inherit;
    }

    #message-input:focus { border-color: #0066ff; }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #attach-btn {
      background: transparent;
      color: #666;
    }

    #attach-btn:hover { color: #333; }

    #send-btn {
      background: #0066ff;
      color: #fff;
    }

    #send-btn:hover { background: #0052cc; }
    #send-btn:disabled { background: #ccc; cursor: default; }

    #file-input { display: none; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>TechMart Customer Support</h1>
      <span>Powered by Foil</span>
    </div>
    <button id="new-session-btn">New Session</button>
  </header>

  <div id="chat-area"></div>

  <div id="test-customers">
    <label>Test customers:</label>
    <button class="chip" data-email="sarah@example.com">sarah@example.com</button>
    <button class="chip" data-email="marcus.j@example.com">marcus.j@example.com</button>
    <button class="chip" data-email="emily.d@example.com">emily.d@example.com</button>
  </div>

  <div id="input-area">
    <div id="input-container">
      <div id="image-preview">
        <img id="preview-img" src="" alt="preview">
        <button id="remove-image">&times;</button>
      </div>
      <button class="icon-btn" id="attach-btn" title="Attach image">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="file" id="file-input" accept="image/*">
      <textarea id="message-input" rows="1" placeholder="Type your message..."></textarea>
      <button class="icon-btn" id="send-btn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chat-area');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const attachBtn = document.getElementById('attach-btn');
    const fileInput = document.getElementById('file-input');
    const imagePreview = document.getElementById('image-preview');
    const previewImg = document.getElementById('preview-img');
    const removeImageBtn = document.getElementById('remove-image');
    const newSessionBtn = document.getElementById('new-session-btn');

    let sessionId = null;
    let selectedFile = null;
    let sending = false;

    async function newSession() {
      const body = sessionId ? JSON.stringify({ oldSessionId: sessionId }) : '{}';
      const res = await fetch('/api/session/new', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body,
      });
      const data = await res.json();
      sessionId = data.sessionId;
      chatArea.innerHTML = '';
      clearImage();
      addMessage('agent', 'Hello! Welcome to TechMart support. How can I help you today?');
    }

    function addMessage(role, text, imageDataUrl) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      if (imageDataUrl) {
        const img = document.createElement('img');
        img.src = imageDataUrl;
        bubble.appendChild(img);
      }
      div.appendChild(bubble);
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message agent';
      div.id = 'typing-indicator';
      div.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function clearImage() {
      selectedFile = null;
      imagePreview.style.display = 'none';
      previewImg.src = '';
      fileInput.value = '';
    }

    async function send() {
      const text = messageInput.value.trim();
      if ((!text && !selectedFile) || sending) return;

      sending = true;
      sendBtn.disabled = true;

      // Show user message
      let imageDataUrl = null;
      if (selectedFile) {
        imageDataUrl = await readFileAsDataUrl(selectedFile);
      }
      addMessage('user', text || '(image attached)', imageDataUrl);

      const file = selectedFile;
      messageInput.value = '';
      clearImage();
      autoResize();

      showTyping();

      try {
        const formData = new FormData();
        formData.append('sessionId', sessionId);
        if (text) formData.append('message', text);
        if (file) formData.append('image', file);

        const res = await fetch('/api/chat', { method: 'POST', body: formData });
        const data = await res.json();

        hideTyping();

        if (data.error) {
          addMessage('agent', 'Sorry, something went wrong. Please try again.');
        } else {
          addMessage('agent', data.reply);
        }
      } catch {
        hideTyping();
        addMessage('agent', 'Sorry, something went wrong. Please try again.');
      }

      sending = false;
      sendBtn.disabled = false;
      messageInput.focus();
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    function autoResize() {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    }

    // Event listeners
    sendBtn.addEventListener('click', send);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    messageInput.addEventListener('input', autoResize);

    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) {
        selectedFile = fileInput.files[0];
        previewImg.src = URL.createObjectURL(selectedFile);
        imagePreview.style.display = 'block';
      }
    });

    removeImageBtn.addEventListener('click', clearImage);

    newSessionBtn.addEventListener('click', newSession);

    // Test customer chips
    document.querySelectorAll('.chip[data-email]').forEach((chip) => {
      chip.addEventListener('click', () => {
        messageInput.value = `Hi, my email is ${chip.dataset.email}`;
        messageInput.focus();
        autoResize();
      });
    });

    // End session on tab close / navigate away
    window.addEventListener('beforeunload', () => {
      if (sessionId) {
        navigator.sendBeacon('/api/session/end', new Blob(
          [JSON.stringify({ sessionId })],
          { type: 'application/json' },
        ));
      }
    });

    // Init
    newSession();
  </script>
</body>
</html>
